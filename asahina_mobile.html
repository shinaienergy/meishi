<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>朝比奈巖｜信愛エナジー株式会社</title>
<meta name="description" content="信愛エナジー株式会社 代表取締役社長 朝比奈巖のデジタル名刺">
<style>
  :root{
    --ink:#13231b;
    --paper:#f3efe4;
    --oil:#c9a227;
    --oil-deep:#a07d12;
    --leaf:#2f5d44;
    --leaf-soft:#4a7a5e;
    --line:rgba(19,35,27,.14);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html{-webkit-text-size-adjust:100%}
  body{
    font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:var(--paper);color:var(--ink);min-height:100dvh;
    display:flex;justify-content:center;line-height:1.7;overflow-x:hidden;
  }
  .stage{width:100%;max-width:430px;position:relative}

  .crest{
    position:relative;padding:46px 30px 40px;
    background:
      radial-gradient(120% 90% at 80% -10%, rgba(201,162,39,.26), transparent 60%),
      linear-gradient(160deg,#16271e 0%,#1d3527 55%,#234032 100%);
    color:var(--paper);overflow:hidden;
  }
  .ring{position:absolute;width:300px;height:300px;border:1px solid rgba(201,162,39,.4);border-radius:50%;top:-140px;right:-110px}
  .ring::after{content:"";position:absolute;inset:34px;border:1px solid rgba(243,239,228,.16);border-radius:50%}
  .label{font-size:11px;letter-spacing:.42em;color:var(--oil);font-weight:700;margin-bottom:22px;position:relative}
  .company{font-size:19px;font-weight:600;letter-spacing:.06em;color:rgba(243,239,228,.82);position:relative}
  .company .en{display:block;font-size:9.5px;letter-spacing:.34em;color:rgba(201,162,39,.7);margin-top:5px;font-weight:600}
  .tagline{position:relative;margin-top:16px;font-size:12px;line-height:1.85;letter-spacing:.04em;color:rgba(243,239,228,.78);font-weight:500;max-width:280px}
  .tagline::before{content:"";display:block;width:24px;height:1px;background:rgba(201,162,39,.6);margin-bottom:11px}

  .id{padding:34px 30px 30px;background:var(--paper);position:relative;margin-top:-1px}
  .id::before{content:"";position:absolute;top:0;left:30px;right:30px;height:2px;background:linear-gradient(90deg,var(--oil),transparent)}
  .role{font-size:12.5px;letter-spacing:.12em;color:var(--leaf);font-weight:700;margin-bottom:10px}
  .name{font-family:"Hiragino Mincho ProN","YuMincho","Yu Mincho",serif;font-size:42px;font-weight:600;letter-spacing:.06em;line-height:1.15}
  .yomi{font-size:12px;letter-spacing:.28em;color:var(--leaf-soft);margin-top:10px;font-weight:600}

  .info{padding:6px 30px 8px}
  .row{display:flex;align-items:flex-start;gap:16px;padding:16px 0;border-bottom:1px solid var(--line);text-decoration:none;color:var(--ink)}
  .row:last-child{border-bottom:none}
  .ic{flex:none;width:38px;height:38px;border-radius:11px;background:rgba(47,93,68,.08);display:grid;place-items:center;color:var(--leaf)}
  .ic svg{width:19px;height:19px}
  .rt{flex:1;min-width:0}
  .rt .k{font-size:10.5px;letter-spacing:.16em;color:var(--leaf-soft);font-weight:700;margin-bottom:2px}
  .rt .v{font-size:15.5px;font-weight:600;word-break:break-word}
  a.row .rt .v{color:var(--oil-deep)}

  .save-wrap{padding:24px 30px 16px}
  .save{display:flex;align-items:center;justify-content:center;gap:11px;width:100%;padding:19px;border:none;border-radius:16px;
    background:linear-gradient(140deg,var(--leaf) 0%,#1d3527 100%);color:var(--paper);font-size:16.5px;font-weight:700;letter-spacing:.04em;
    font-family:inherit;cursor:pointer;box-shadow:0 8px 22px rgba(29,53,39,.28);transition:transform .12s ease, box-shadow .12s ease}
  .save:active{transform:translateY(2px);box-shadow:0 4px 12px rgba(29,53,39,.28)}
  .save svg{width:21px;height:21px}
  .hint{text-align:center;font-size:11.5px;color:var(--leaf-soft);padding:2px 30px 0;letter-spacing:.04em}

  .foot{padding:26px 30px 38px;text-align:center;font-size:10px;letter-spacing:.24em;color:rgba(19,35,27,.4);font-weight:600}
  .foot::before{content:"";display:block;width:30px;height:1px;background:var(--oil);margin:0 auto 16px}

  .crest{padding-bottom:78px}
  .avatar{
    position:relative;width:124px;height:124px;border-radius:50%;
    margin:18px auto -62px;display:block;
    border:4px solid var(--paper);
    box-shadow:0 10px 26px rgba(0,0,0,.30);
    object-fit:cover;object-position:center 28%;z-index:5;
    background:var(--paper);
  }
  .id{padding-top:78px;text-align:center}
  .id::before{left:50%;transform:translateX(-50%);width:60px;border-radius:2px}
  .role{margin-top:2px}
</style>
</head>
<body>
<div class="stage">

  <header class="crest">
    <div class="ring"></div>
    <div class="label">DIGITAL CARD</div>
    <div class="company">信愛エナジー株式会社
      <span class="en">SHINAI ENERGY CO., LTD.</span>
    </div>
    <p class="tagline">使用済み食用油を、燃料へ。<br>環境と暮らしをつなぐエネルギー事業。</p>
    <img class="avatar" src="https://shinaienergy.github.io/meishi/asahina-photo.jpg" alt="朝比奈巖 代表取締役社長">
  </header>

  <section class="id">
    <div class="role">代表取締役社長</div>
    <h1 class="name">朝比奈 巖</h1>
    <div class="yomi">ASAHINA  IWAO</div>
  </section>

  <section class="info">
    <a class="row" href="tel:0454595741">
      <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.9.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/></svg></span>
      <div class="rt"><div class="k">TEL（代表）</div><div class="v">045-459-5741</div></div>
    </a>
    <a class="row" href="tel:09035759318">
      <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2.5"/><line x1="12" y1="18" x2="12" y2="18"/></svg></span>
      <div class="rt"><div class="k">MOBILE</div><div class="v">090-3575-9318</div></div>
    </a>
    <a class="row" href="mailto:shinai.energy@gmail.com">
      <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 6 10-6"/></svg></span>
      <div class="rt"><div class="k">EMAIL</div><div class="v">shinai.energy@gmail.com</div></div>
    </a>
    <a class="row" href="https://sinaienergy.jp/" target="_blank" rel="noopener">
      <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg></span>
      <div class="rt"><div class="k">WEBSITE</div><div class="v">sinaienergy.jp</div></div>
    </a>
    <a class="row" href="https://maps.google.com/?q=神奈川県横浜市泉区上飯田町3609-1" target="_blank" rel="noopener">
      <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg></span>
      <div class="rt"><div class="k">ADDRESS</div><div class="v">神奈川県横浜市泉区上飯田町3609-1</div></div>
    </a>
  </section>

  <div class="save-wrap">
    <button class="save" id="save">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
      連絡先を保存
    </button>
  </div>
  <p class="hint">タップすると電話帳に追加できます</p>

  <footer class="foot">SHINAI ENERGY ／ 環境と暮らしをつなぐ</footer>
</div>

<script>
const vcard = [
  "BEGIN:VCARD",
  "VERSION:3.0",
  "N:朝比奈;巖;;;",
  "FN:朝比奈 巖",
  "X-PHONETIC-LAST-NAME:アサヒナ",
  "X-PHONETIC-FIRST-NAME:イワオ",
  "ORG:信愛エナジー株式会社",
  "TITLE:代表取締役社長",
  "PHOTO;VALUE=URI;TYPE=JPEG:https://shinaienergy.github.io/meishi/asahina-photo.jpg",
  "TEL;TYPE=WORK,VOICE:045-459-5741",
  "TEL;TYPE=CELL,VOICE:090-3575-9318",
  "EMAIL;TYPE=WORK:shinai.energy@gmail.com",
  "ADR;TYPE=WORK:;;神奈川県横浜市泉区上飯田町3609-1;;;;",
  "URL:https://sinaienergy.jp/",
  "END:VCARD"
].join("\r\n");

document.getElementById("save").addEventListener("click", function(){
  const blob = new Blob(["\ufeff" + vcard], {type:"text/vcard;charset=utf-8"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "朝比奈巖_信愛エナジー.vcf";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 1500);
});
</script>
</body>
</html>
