<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>遠山貴子｜信愛エナジー株式会社</title>
<meta name="description" content="信愛エナジー株式会社 営業部顧問 遠山貴子のデジタル名刺">
<style>
  :root{
    --ink:#13231b;
    --paper:#f3efe4;
    --oil:#c9a227;      /* 廃食油のゴールド */
    --oil-deep:#a07d12;
    --leaf:#2f5d44;     /* 循環・環境のグリーン */
    --leaf-soft:#4a7a5e;
    --line:rgba(19,35,27,.14);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html{-webkit-text-size-adjust:100%}
  body{
    font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:var(--paper);
    color:var(--ink);
    min-height:100dvh;
    display:flex;
    justify-content:center;
    line-height:1.7;
    overflow-x:hidden;
  }
  .stage{width:100%;max-width:430px;position:relative}

  /* ---- 上部：循環をモチーフにしたヘッダー ---- */
  .crest{
    position:relative;
    padding:46px 30px 40px;
    background:
      radial-gradient(120% 90% at 80% -10%, rgba(201,162,39,.22), transparent 60%),
      linear-gradient(160deg,#16271e 0%,#1d3527 55%,#234032 100%);
    color:var(--paper);
    overflow:hidden;
  }
  .ring{
    position:absolute;
    width:300px;height:300px;
    border:1px solid rgba(201,162,39,.35);
    border-radius:50%;
    top:-140px;right:-110px;
  }
  .ring::after{
    content:"";position:absolute;inset:34px;
    border:1px solid rgba(243,239,228,.16);
    border-radius:50%;
  }
  .label{
    font-size:11px;letter-spacing:.42em;
    color:var(--oil);
    font-weight:700;
    margin-bottom:22px;
    position:relative;
  }
  .company{
    font-size:19px;font-weight:600;letter-spacing:.06em;
    color:rgba(243,239,228,.82);
    position:relative;
  }
  .company .en{
    display:block;font-size:9.5px;letter-spacing:.34em;
    color:rgba(201,162,39,.7);margin-top:5px;font-weight:600;
  }
  .tagline{
    position:relative;margin-top:16px;
    font-size:12px;line-height:1.85;letter-spacing:.04em;
    color:rgba(243,239,228,.78);font-weight:500;
    max-width:280px;
  }
  .tagline::before{
    content:"";display:block;width:24px;height:1px;
    background:rgba(201,162,39,.6);margin-bottom:11px;
  }

  /* ---- 名前カード ---- */
  .id{
    padding:34px 30px 30px;
    background:var(--paper);
    position:relative;
    margin-top:-1px;
  }
  .id::before{
    content:"";position:absolute;top:0;left:30px;right:30px;height:2px;
    background:linear-gradient(90deg,var(--oil),transparent);
  }
  .role{
    font-size:12.5px;letter-spacing:.12em;color:var(--leaf);
    font-weight:700;margin-bottom:10px;
  }
  .name{
    font-family:"Hiragino Mincho ProN","YuMincho","Yu Mincho",serif;
    font-size:42px;font-weight:600;letter-spacing:.06em;
    line-height:1.15;
  }
  .yomi{
    font-size:12px;letter-spacing:.28em;color:var(--leaf-soft);
    margin-top:10px;font-weight:600;
  }

  /* ---- 情報リスト ---- */
  .info{padding:6px 30px 8px}
  .row{
    display:flex;align-items:flex-start;gap:16px;
    padding:16px 0;border-bottom:1px solid var(--line);
    text-decoration:none;color:var(--ink);
  }
  .row:last-child{border-bottom:none}
  .ic{
    flex:none;width:38px;height:38px;border-radius:11px;
    background:rgba(47,93,68,.08);
    display:grid;place-items:center;
    color:var(--leaf);
  }
  .ic svg{width:19px;height:19px}
  .rt{flex:1;min-width:0}
  .rt .k{font-size:10.5px;letter-spacing:.16em;color:var(--leaf-soft);font-weight:700;margin-bottom:2px}
  .rt .v{font-size:15.5px;font-weight:600;word-break:break-word}
  a.row .rt .v{color:var(--oil-deep)}

  /* ---- 保存ボタン ---- */
  .save-wrap{padding:24px 30px 16px}
  .save{
    display:flex;align-items:center;justify-content:center;gap:11px;
    width:100%;padding:19px;border:none;border-radius:16px;
    background:linear-gradient(140deg,var(--leaf) 0%,#1d3527 100%);
    color:var(--paper);font-size:16.5px;font-weight:700;letter-spacing:.04em;
    font-family:inherit;cursor:pointer;
    box-shadow:0 8px 22px rgba(29,53,39,.28);
    transition:transform .12s ease, box-shadow .12s ease;
  }
  .save:active{transform:translateY(2px);box-shadow:0 4px 12px rgba(29,53,39,.28)}
  .save svg{width:21px;height:21px}
  .hint{
    text-align:center;font-size:11.5px;color:var(--leaf-soft);
    padding:2px 30px 0;letter-spacing:.04em;
  }

  /* ---- フッター ---- */
  .foot{
    padding:26px 30px 38px;text-align:center;
    font-size:10px;letter-spacing:.24em;color:rgba(19,35,27,.4);
    font-weight:600;
  }
  .foot::before{
    content:"";display:block;width:30px;height:1px;
    background:var(--oil);margin:0 auto 16px;
  }

  .crest{padding-bottom:78px}
  .avatar{
    position:relative;width:124px;height:124px;border-radius:50%;
    margin:18px auto -62px;display:block;
    border:4px solid var(--paper);
    box-shadow:0 10px 26px rgba(0,0,0,.30);
    object-fit:cover;object-position:center 22%;z-index:5;
    background:var(--paper);
  }
  .id{padding-top:78px;text-align:center}
  .id::before{left:50%;transform:translateX(-50%);width:60px;border-radius:2px}
  .role{margin-top:2px}
</style>
</head>
